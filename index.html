<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><meta name='theme-color' content='#168a55'><title>David Cut Tracker</title><link rel='manifest' href='manifest.webmanifest'><link rel='icon' href='app-icon.svg' type='image/svg+xml'><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 0 0,#dff8d4,transparent 28rem),#f3faf2;color:#17211a}main{width:min(92vw,520px);padding:24px;border:1px solid #d9e6da;border-radius:18px;background:#fff;box-shadow:0 18px 44px #18211a22}svg{width:82px;filter:drop-shadow(0 10px 18px #168a5533)}h1{margin:12px 0 6px;color:#177a1e;font-style:italic;text-transform:uppercase}.bar{height:8px;border-radius:999px;background:#e4eee5;overflow:hidden}.bar span{display:block;height:100%;width:65%;background:linear-gradient(90deg,#168a55,#83c341);animation:pulse 1s infinite alternate}.err{white-space:pre-wrap;color:#b3261e;font-size:13px}.btn{display:inline-block;margin-top:12px;padding:10px 12px;border-radius:10px;background:#168a55;color:white;text-decoration:none;font-weight:850}@keyframes pulse{to{width:95%}}</style></head><body><main id='boot'><svg viewBox='0 0 128 128' aria-hidden='true'><path d='M64 10c24 0 44 31 44 63 0 27-18 45-44 45S20 100 20 73c0-32 20-63 44-63z' fill='#166f35'/><path d='M64 22c18 0 33 25 33 51 0 21-14 34-33 34S31 94 31 73c0-26 15-51 33-51z' fill='#b9ef67'/><circle cx='64' cy='78' r='18' fill='#8b5426'/><circle cx='52' cy='55' r='4' fill='#17211a'/><circle cx='76' cy='55' r='4' fill='#17211a'/><path d='M56 64c5 5 11 5 16 0' fill='none' stroke='#17211a' stroke-width='4' stroke-linecap='round'/></svg><h1>Cut Tracker</h1><p id='msg'>Loading the upgraded tracker...</p><div class='bar'><span></span></div></main><script>(async()=>{const VERSION='20260620safe2',CHUNKS=8,CACHE_KEY='cutTrackerCachedAppHtml',RAW='https://raw.githubusercontent.com/com03/david-cut-tracker/main/payload-v2/',LOCAL='./payload-v2/',boot=document.getElementById('boot'),msg=document.getElementById('msg');async function cleanOldOfflineFiles(){try{if(localStorage.getItem('cutTrackerSafeBoot')===VERSION)return;localStorage.setItem('cutTrackerSafeBoot',VERSION);if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(reg=>reg.unregister()))}if(window.caches){const keys=await caches.keys();await Promise.all(keys.filter(key=>key.startsWith('david-cut-tracker')).map(key=>caches.delete(key)))}}catch(e){}}async function getChunk(index){const rawUrl=RAW+'app.'+index+'.txt?v='+VERSION,localUrl=LOCAL+'app.'+index+'.txt?v='+VERSION+'-'+Date.now(),urls=location.hostname.endsWith('github.io')?[rawUrl,localUrl]:[localUrl,rawUrl];let lastError;for(const url of urls){try{const response=await fetch(url,{cache:'reload'});if(response.ok)return await response.text();lastError=new Error(url+' returned '+response.status)}catch(error){lastError=error}}throw lastError||new Error('Tracker file '+(index+1)+' failed')}function decodeBase64Utf8(value){const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/',clean=String(value).replace(/[^A-Za-z0-9+/]/g,''),bytes=[];for(let i=0;i<clean.length;i+=4){const a=chars.indexOf(clean[i]),b=chars.indexOf(clean[i+1]),c=chars.indexOf(clean[i+2]||'A'),d=chars.indexOf(clean[i+3]||'A');if(a<0||b<0)continue;const n=(a<<18)|(b<<12)|((c<0?0:c)<<6)|(d<0?0:d);bytes.push((n>>16)&255);if(i+2<clean.length)bytes.push((n>>8)&255);if(i+3<clean.length)bytes.push(n&255)}if(window.TextDecoder)return new TextDecoder('utf-8').decode(new Uint8Array(bytes));let out='';bytes.forEach(byte=>{out+='%'+('0'+byte.toString(16)).slice(-2)});return decodeURIComponent(out)}function run(code){const s=document.createElement('script');s.textContent=code;(document.body||document.documentElement).appendChild(s)}function openApp(html){const scripts=[];html=html.replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gi,(m,code)=>{scripts.push(code);return''});document.open();document.write(html);document.close();run('if(!Array.prototype.at){Array.prototype.at=function(n){n=Math.trunc(n)||0;if(n<0)n+=this.length;return this[n]}}');scripts.forEach(run)}function showError(error){boot.innerHTML='<h1>Cut Tracker did not load</h1><p>Tap once to clear the old GitHub Pages cache and reload.</p><p id=err class=err></p><a class=btn href=./?reset='+Date.now()+'>Reload clean version</a>';document.getElementById('err').textContent=String(error&&error.message||error)}try{await cleanOldOfflineFiles();const parts=[];for(let i=0;i<CHUNKS;i++){msg.textContent='Loading tracker files '+(i+1)+'/'+CHUNKS+'...';parts.push(await getChunk(i))}const html=decodeBase64Utf8(parts.join(''));try{localStorage.setItem(CACHE_KEY,html)}catch(e){}openApp(html)}catch(error){const cached=localStorage.getItem(CACHE_KEY);if(cached){openApp(cached);return}console.error(error);showError(error)}})();</script></body></html>
