<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#168a55"><title>David Cut Tracker</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 0 0,#dff8d4,transparent 28rem),#f3faf2;color:#17211a}main{width:min(92vw,520px);padding:24px;border:1px solid #d9e6da;border-radius:18px;background:#fff;box-shadow:0 18px 44px #18211a22}svg{width:82px;filter:drop-shadow(0 10px 18px #168a5533)}h1{margin:12px 0 6px;color:#177a1e;font-style:italic;text-transform:uppercase}.bar{height:8px;border-radius:999px;background:#e4eee5;overflow:hidden}.bar span{display:block;height:100%;width:65%;background:linear-gradient(90deg,#168a55,#83c341);animation:pulse 1s infinite alternate}.err{white-space:pre-wrap;color:#b3261e;font-size:13px}.btn{display:inline-block;margin-top:12px;padding:10px 12px;border-radius:10px;background:#168a55;color:white;text-decoration:none;font-weight:850}@keyframes pulse{to{width:95%}}</style></head><body><main id="boot"><svg viewBox="0 0 128 128" aria-hidden="true"><path d="M64 10c24 0 44 31 44 63 0 27-18 45-44 45S20 100 20 73c0-32 20-63 44-63z" fill="#166f35"/><path d="M64 22c18 0 33 25 33 51 0 21-14 34-33 34S31 94 31 73c0-26 15-51 33-51z" fill="#b9ef67"/><circle cx="64" cy="78" r="18" fill="#8b5426"/><circle cx="52" cy="55" r="4" fill="#17211a"/><circle cx="76" cy="55" r="4" fill="#17211a"/><path d="M56 64c5 5 11 5 16 0" fill="none" stroke="#17211a" stroke-width="4" stroke-linecap="round"/></svg><h1>Cut Tracker</h1><p id="msg">Loading the upgraded tracker...</p><div class="bar"><span></span></div></main><script>(async()=>{const VERSION="20260620c";const msg=document.getElementById("msg");const fresh=async()=>{try{if(localStorage.getItem("cutTrackerBoot")!==VERSION){if("serviceWorker" in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if(window.caches){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}localStorage.setItem("cutTrackerBoot",VERSION)}}catch(e){console.warn(e)}};const get=async(i)=>{const urls=[`payload-v2/app.${i}.txt?v=${VERSION}`,`./payload-v2/app.${i}.txt?fresh=${Date.now()}`];let last;for(const u of urls){try{const r=await fetch(u,{cache:"reload"});if(r.ok)return await r.text();last=new Error(`${u} -> ${r.status}`)}catch(e){last=e}}throw last||new Error(`chunk ${i} failed`)};const decode=(b64)=>{if(window.TextDecoder){const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));return new TextDecoder("utf-8").decode(bytes)}const bin=atob(b64);let out="";for(let i=0;i<bin.length;i++)out+="%"+("00"+bin.charCodeAt(i).toString(16)).slice(-2);return decodeURIComponent(out)};try{await fresh();const parts=[];for(let i=0;i<8;i++){msg.textContent=`Loading tracker files ${i+1}/8...`;parts.push(await get(i))}const html=decode(parts.join(""));document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById("boot").innerHTML=`<h1>Cut Tracker did not load</h1><p>Tap the button once to clear the old GitHub Pages cache and reload.</p><p class="err">${String(e&&e.message||e)}</p><a class="btn" href="./?reset=${Date.now()}">Reload clean version</a>`}})();</script></body></html>
